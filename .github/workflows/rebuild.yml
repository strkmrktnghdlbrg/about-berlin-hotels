# Live-Rebuild alle 6h, damit Stay22-API-Daten (Preise/Verfügbarkeiten)
# frisch bleiben. Stay22-ToS erlaubt 60 Min HTTP-Cache → 6h Rebuild ist
# defensiv. Voraussetzung: GitHub Secret STAY22_API_KEY gepflegt.
#
# Setup (einmalig):
#   gh secret set STAY22_API_KEY --body "stay22_..."   --repo <owner>/<repo>
#
# Dieser Workflow läuft auf dem Default-Branch (main). Wenn das Deployment
# über Cloudflare Pages Git-Integration läuft, reicht der `git push` aus
# diesem Workflow, um den Pages-Build zu triggern. Sonst:
#   - All-Inkl: rsync-over-SSH Step ergänzen (siehe Playbook 3c)
#   - Cloudflare direkt: `wrangler pages deploy dist`
name: Rebuild with fresh Stay22 data

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 02/08/14/20 UTC → 04/10/16/22 Berlin (MESZ) bzw. 03/09/15/21 (MEZ)
    - cron: "0 2,8,14,20 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build Astro with Stay22 live data
        env:
          STAY22_API_KEY: ${{ secrets.STAY22_API_KEY }}
        run: npm run build

      # Deploy nach MyTrueHost (Shared Apache) per FTP.
      # Lädt nur geänderte Dateien hoch (inkl. versteckter .htaccess).
      # Benötigte GitHub-Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
      #   gh secret set FTP_SERVER   --repo strkmrktnghdlbrg/about-berlin-hotels
      #   gh secret set FTP_USERNAME --repo strkmrktnghdlbrg/about-berlin-hotels
      #   gh secret set FTP_PASSWORD --repo strkmrktnghdlbrg/about-berlin-hotels
      - name: Deploy to MyTrueHost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          # Zielverzeichnis: bei MyTrueHost i.d.R. der Webroot der Domain.
          # Anpassen falls die Domain in einem Unterordner liegt
          # (z.B. /public_html/ oder /domains/about-berlin-hotels.de/public_html/).
          server-dir: ./public_html/
          dangerous-clean-slate: false
