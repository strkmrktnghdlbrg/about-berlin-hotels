name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 02/08/14/20 UTC → alle 6h neu bauen für frische Stay22-Preise/Verfügbarkeiten
    - cron: "0 2,8,14,20 * * *"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production
          STAY22_API_KEY: ${{ secrets.STAY22_API_KEY }}

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"

      - name: Commit dist/ to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f dist/
          git diff --staged --quiet || git commit -m "build: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase origin main
          git push origin main

      - name: Trigger cPanel pull & deploy
        run: |
          BASE="https://king.truehostdns.com:2083"
          AUTH="${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}"
          REPO_ROOT="/home/scdunumd/public_html/about-berlin-hotels.de"
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$REPO_ROOT'))")

          PROXY="https://cpanel.about-berlin-hotels.de"

          echo "--- Server-HEAD ermitteln ---"
          HEAD_SHA=$(curl -sS -k --connect-timeout 15 --max-time 60 -u "$AUTH" -G \
            "$PROXY/execute/VersionControl/retrieve" 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['last_update']['identifier'])" 2>/dev/null || true)
          [ -z "$HEAD_SHA" ] && HEAD_SHA=6449781
          echo "Server-HEAD: $HEAD_SHA"

          echo "--- dist/.htaccess auf Git-Stand des Server-HEAD zurücksetzen ---"
          git show "$HEAD_SHA:dist/.htaccess" > /tmp/htaccess-clean
          curl -sS -k --connect-timeout 15 --max-time 60 -u "$AUTH" -X POST \
            --data-urlencode "dir=$REPO_ROOT/dist" \
            --data-urlencode "file=.htaccess" \
            --data-urlencode "content@/tmp/htaccess-clean" \
            "$PROXY/execute/Fileman/save_file_content" | head -c 800; echo

          echo "--- git pull (VersionControl update) ---"
          curl -sS -k --connect-timeout 15 --max-time 120 -u "$AUTH" -G \
            --data-urlencode "repository_root=$REPO_ROOT" \
            --data-urlencode "branch=main" \
            "$PROXY/execute/VersionControl/update" | head -c 1500; echo

          echo "--- Deployment anstoßen ---"
          curl -sS -k --connect-timeout 15 --max-time 120 -u "$AUTH" -G \
            --data-urlencode "repository_root=$REPO_ROOT" \
            "$PROXY/execute/VersionControlDeployment/create" | head -c 800; echo

          echo "--- Live-Check ---"
          sleep 10
          curl -s -o /dev/null -w "parken-Seite: %{http_code}\n" "https://www.about-berlin-hotels.de/parken-flughafen-berlin/"
          curl -s -o /dev/null -w "r-Redirect: %{http_code} -> %{redirect_url}\n" "https://www.about-berlin-hotels.de/r/parken-fliegen/"

      - name: Deploy note
        run: |
          echo "✅ dist/ committed to main — cPanel cron will pull within 5 minutes"
          echo "Commit: $(git rev-parse --short HEAD)"
