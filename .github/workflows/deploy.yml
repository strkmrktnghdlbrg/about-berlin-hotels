name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 02/08/14/20 UTC → alle 6h neu bauen für frische Stay22-Preise/Verfügbarkeiten
    - cron: "0 2,8,14,20 * * *"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production
          STAY22_API_KEY: ${{ secrets.STAY22_API_KEY }}

      - name: Build report
        run: |
          echo "Built files: $(find dist -type f | wc -l)"
          echo "Total size: $(du -sh dist | cut -f1)"

      - name: Commit dist/ to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f dist/
          git diff --staged --quiet || git commit -m "build: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase origin main
          git push origin main

      - name: Trigger cPanel pull & deploy
        run: |
          BASE="https://king.truehostdns.com:2083"
          AUTH="${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}"
          REPO_ROOT="/home/scdunumd/public_html/about-berlin-hotels.de"
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$REPO_ROOT'))")

          echo "--- Pulling from GitHub ---"
          curl -sk -u "$AUTH" \
            "$BASE/json-api/cpanel?cpanel_jsonapi_version=2&cpanel_jsonapi_module=VersionControl&cpanel_jsonapi_func=update&repository_root=$ENCODED" 2>&1 || true

          echo "--- Deploying HEAD commit ---"
          curl -sk -u "$AUTH" \
            "$BASE/json-api/cpanel?cpanel_jsonapi_version=2&cpanel_jsonapi_module=VersionControlDeployment&cpanel_jsonapi_func=create&repository_root=$ENCODED" 2>&1 || true

      - name: Deploy note
        run: |
          echo "✅ dist/ committed to main — cPanel cron will pull within 5 minutes"
          echo "Commit: $(git rev-parse --short HEAD)"
